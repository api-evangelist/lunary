specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Lunary
providerId: lunary
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI Evaluation
- Observability
- Open Source
- LLM
- Tracing
- Prompts
- Rate Limiting
- Quotas
- Throttling
description: >-
  Lunary's API uses a sliding-window rate limiter. The current published limit is 30 requests per
  second per API key. Standard HTTP codes are returned (429 rate-limit, 422 invalid params, 403
  unauthorized, 50x server). Self-hosted deployments are unconstrained beyond your own infrastructure.
notes: Sliding window; 30 RPS per key on hosted SaaS.
sources:
- https://docs.lunary.ai/api
responseCodes:
  throttled: 429
limits:
- name: Per API key (hosted)
  scope: account
  metric: requests-per-second
  limit: 30 RPS
  notes: Sliding-window rate limiter on the hosted SaaS.
policies:
- name: Backoff Strategy
  description: On 429, apply exponential backoff with jitter.
- name: Self-Host Option
  description: For very high event volume, deploy self-hosted to remove rate-limit ceiling.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
