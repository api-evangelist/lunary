specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Lunary
providerId: lunary
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI Evaluation
- Observability
- Open Source
- LLM
- Tracing
- Prompts
- Plans
description: >-
  Lunary offers a free Hobby tier (limited monthly events), paid Team and Pro tiers with higher event
  volume and seats, and Enterprise. Self-hosting is free and unlimited under Apache 2.0. Pricing is
  published self-serve on the website.
notes: Free Hobby tier; published Team/Pro tiers; Enterprise sales-led; self-host free under Apache 2.0.
sources:
- https://lunary.ai/pricing
- https://github.com/lunary-ai/lunary
plans:
- id: lunary-self-host
  name: Self-Hosted (Apache 2.0)
  type: free
  description: Run Lunary on your own infrastructure under Apache 2.0; no usage cap.
  entries:
  - label: Self-Host
    name: self_host
    type: flat
    metric: deployment
    limit: -1
    timeFrame: lifetime
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: Apache 2.0
  - name: No usage cap
- id: lunary-hobby
  name: Hobby (Hosted Free)
  type: free
  description: Free hosted tier with limited monthly events for individuals.
  entries:
  - label: Free Tier
    name: free
    type: flat
    metric: month
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: Limited monthly events
  - name: Single user
- id: lunary-team-pro
  name: Team / Pro
  type: paid
  description: Paid hosted tiers with higher event volume, multiple seats, and advanced features.
  entries:
  - label: Subscription
    name: subscription
    type: flat
    metric: month
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: see https://lunary.ai/pricing
    userMultiplied: true
  elements:
  - name: Multi-seat
  - name: Higher event volume
  - name: Datasets, evaluations
- id: lunary-enterprise
  name: Enterprise
  type: enterprise
  description: SSO, on-prem support, custom commitments.
  entries:
  - label: Contract
    name: contract
    type: flat
    metric: year
    limit: -1
    timeFrame: annual
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: true
  elements:
  - name: SSO
  - name: On-prem
  - name: Custom commit
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
