description: >-
  FOCUS-aligned FinOps profile for Lunary. Cost is driven by tier (seats) plus event volume on the
  hosted SaaS. Self-hosted under Apache 2.0 trades vendor cost for compute/storage cost on your own
  infrastructure. Optimize by sampling, batching, and self-hosting at high event scale.
notes: Seat + event-volume hosted, or compute/storage self-hosted.
